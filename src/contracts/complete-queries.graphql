# 1. List all Range Battles (LPBattleVault)
query ListRangeBattles {
  LPBattleVault_BattleCreated(order_by: {battleId: desc}, limit: 10) {
    id
    battleId
    creator
    creatorTokenId
    duration
    totalValueUSD
  }
}

# 2. Get complete battle information by battleId
query GetCompleteBattleInfo($battleId: bigint!) {
  # Creation info
  creation: LPBattleVault_BattleCreated(where: {battleId: {_eq: $battleId}}) {
    id
    battleId
    creator
    creatorTokenId
    duration
    totalValueUSD
  }
  
  # Join info (if battle has been joined)
  joined: LPBattleVault_BattleJoined(where: {battleId: {_eq: $battleId}}) {
    id
    battleId
    opponent
    opponentTokenId
    startTime
  }
  
  # Resolution info (if battle has been resolved)
  resolved: LPBattleVault_BattleResolved(where: {battleId: {_eq: $battleId}}) {
    id
    battleId
    winner
    resolver
    resolverReward
  }
  
  # Check if there was an emergency withdrawal
  emergencyWithdrawals: LPBattleVault_EmergencyWithdrawal(where: {battleId: {_eq: $battleId}}) {
    id
    battleId
    to
    tokenId
  }
}

# 3. Get battles created by a specific user
query GetUserCreatedBattles($userAddress: String!) {
  LPBattleVault_BattleCreated(
    where: {creator: {_eq: $userAddress}},
    order_by: {battleId: desc}
  ) {
    id
    battleId
    creator
    creatorTokenId
    duration
    totalValueUSD
  }
}

# 4. Get battles joined by a specific user
query GetUserJoinedBattles($userAddress: String!) {
  LPBattleVault_BattleJoined(
    where: {opponent: {_eq: $userAddress}},
    order_by: {battleId: desc}
  ) {
    id
    battleId
    opponent
    opponentTokenId
    startTime
  }
}

# 5. Get battles won by a specific user
query GetUserWonBattles($userAddress: String!) {
  LPBattleVault_BattleResolved(
    where: {winner: {_eq: $userAddress}},
    order_by: {battleId: desc}
  ) {
    id
    battleId
    winner
    resolver
    resolverReward
  }
}

# 6. Get all user battles (created, joined, and won)
query GetAllUserBattles($userAddress: String!) {
  created: LPBattleVault_BattleCreated(
    where: {creator: {_eq: $userAddress}},
    order_by: {battleId: desc}
  ) {
    id
    battleId
    creator
    creatorTokenId
    duration
    totalValueUSD
  }
  
  joined: LPBattleVault_BattleJoined(
    where: {opponent: {_eq: $userAddress}},
    order_by: {battleId: desc}
  ) {
    id
    battleId
    opponent
    opponentTokenId
    startTime
  }
  
  won: LPBattleVault_BattleResolved(
    where: {winner: {_eq: $userAddress}},
    order_by: {battleId: desc}
  ) {
    id
    battleId
    winner
    resolverReward
  }
}

# 7. Get battles that are ready to be resolved (need to be calculated client-side)
query GetActiveBattles {
  # Get all joined battles
  LPBattleVault_BattleJoined(order_by: {battleId: desc}, limit: 100) {
    id
    battleId
    opponent
    opponentTokenId
    startTime
    
    # Get the creation info for each battle
    battle: LPBattleVault_BattleCreated(where: {battleId: {_eq: $battleId}}) {
      creator
      creatorTokenId
      duration
      totalValueUSD
    }
    
    # Check if already resolved
    resolution: LPBattleVault_BattleResolved(where: {battleId: {_eq: $battleId}}) {
      winner
    }
  }
}

# 8. List all Fee Battles (LPFeeBattle)
query ListFeeBattles {
  LPFeeBattle_BattleCreated(order_by: {battleId: desc}, limit: 10) {
    id
    battleId
    creator
    creatorTokenId
  }
}

# 9. Get complete fee battle information
query GetCompleteFeeBattleInfo($battleId: bigint!) {
  # Creation info
  creation: LPFeeBattle_BattleCreated(where: {battleId: {_eq: $battleId}}) {
    id
    battleId
    creator
    creatorTokenId
  }
  
  # Join info (if battle has been joined)
  joined: LPFeeBattle_BattleJoined(where: {battleId: {_eq: $battleId}}) {
    id
    battleId
    opponent
    opponentTokenId
  }
  
  # Resolution info (if battle has been resolved)
  resolved: LPFeeBattle_BattleResolved(where: {battleId: {_eq: $battleId}}) {
