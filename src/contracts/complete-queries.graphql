# 10. Get contract configuration
query GetContractConfiguration {
  # Get stablecoin settings
  stablecoins: LPBattleVault_StablecoinSet {
    id
    token
    isStablecoin
  }
  
  # Get price feed settings
  priceFeeds: LPBattleVault_PriceFeedSet {
    id
    token
    priceFeed
  }
  
  # Get ownership info
  ownership: LPBattleVault_OwnershipTransferred(order_by: {id: desc}, limit: 1) {
    id
    previousOwner
    newOwner
  }
  
  # Get pause status
  pauses: LPBattleVault_Paused(order_by: {id: desc}, limit: 1) {
    id
    account
  }
  
  unpauses: LPBattleVault_Unpaused(order_by: {id: desc}, limit: 1) {
    id
    account
  }
}

# 11. Get recent activity across all battles
query GetRecentActivity($limit: Int = 20) {
  creations: LPBattleVault_BattleCreated(order_by: {id: desc}, limit: $limit) {
    id
    battleId
    creator
    creatorTokenId
    duration
    totalValueUSD
  }
  
  joins: LPBattleVault_BattleJoined(order_by: {id: desc}, limit: $limit) {
    id
    battleId
    opponent
    opponentTokenId
    startTime
  }
  
  resolutions: LPBattleVault_BattleResolved(order_by: {id: desc}, limit: $limit) {
    id
    battleId
    winner
    resolver
    resolverReward
  }
  
  emergencyWithdrawals: LPBattleVault_EmergencyWithdrawal(order_by: {id: desc}, limit: $limit) {
    id
    battleId
    to
    tokenId
  }
}